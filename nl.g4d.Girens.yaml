  - name: girens
    buildsystem: meson
    config-opts:
      - --libdir=lib
      - -Dbuildtype=release
      - -Dnetwork_tests=false
    builddir: true
    sources:
      - type: git
        url: https://gitlab.gnome.org/tijder/girens
        commit: 13712281223c91ba7901e411f3341883fa323f11
        tag: v2.0.9
