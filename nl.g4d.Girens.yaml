app-id: nl.g4d.Girens
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: girens
finish-args:
  - --share=network
  - --share=ipc
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --device=all
  - --own-name=org.mpris.MediaPlayer2.Girens
  - --talk-name=org.freedesktop.secrets
  - --metadata=X-DConf=migrate-path=/nl/g4d/Girens/
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/doc
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - '*.la'
  - '*.a'
modules:
  - name: libmpv
    cleanup:
      - /include
      - /lib/pkgconfig
    buildsystem: meson
    config-opts:
      - -Dbuild-date=false
      - -Dlibmpv=true
      - -Dmanpage-build=disabled
      - -Dcdda=disabled
      - -Ddvbin=disabled
      - -Ddvdnav=disabled
      - -Dlibarchive=enabled
      - -Dshaderc=disabled
      - -Dvulkan=disabled
    sources:
      - type: git
        url: https://github.com/mpv-player/mpv
        tag: v0.41.0
        commit: 41f6a645068483470267271e1d09966ca3b9f413
        x-checker-data:
          type: git
    modules:
      - name: libass
        cleanup:
          - /include
          - /lib/*.la
          - /lib/pkgconfig
        config-opts:
          - --disable-static
        sources:
          - type: archive
            url: https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
            sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
            x-checker-data:
              type: anitya
              project-id: 1560
              stable-only: true
              url-template: https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz
        modules:
          - name: fribidi
            cleanup:
              - /bin
              - /include
              - /lib/pkgconfig
              - /lib/*.la
              - /share/man
            sources:
              - type: archive
                url: https://github.com/fribidi/fribidi/releases/download/v1.0.16/fribidi-1.0.16.tar.xz
                sha256: 1b1cde5b235d40479e91be2f0e88a309e3214c8ab470ec8a2744d82a5a9ea05c
                x-checker-data:
                  type: anitya
                  project-id: 857
                  stable-only: true
                  url-template: https://github.com/fribidi/fribidi/releases/download/v$version/fribidi-$version.tar.xz
          - name: libplacebo
            buildsystem: meson
            config-opts:
              - -Dvulkan=enabled
              - -Dshaderc=disabled
            cleanup:
              - /lib/pkgconfig
              - /include
            sources:
              - type: git
                url: https://code.videolan.org/videolan/libplacebo.git
                tag: v7.360.1
                commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
                x-checker-data:
                  type: git
            modules:
              - name: glslang
                buildsystem: cmake-ninja
                builddir: true
                config-opts:
                  - -DBUILD_SHARED_LIBS=ON
                  - -DENABLE_OPT=OFF
                cleanup:
                  - /bin
                  - /lib/cmake
                  - /include
                sources:
                  - type: archive
                    archive-type: tar
                    url: https://github.com/KhronosGroup/glslang/archive/refs/tags/16.3.0.tar.gz
                    sha256: efff5a15258dce1ca2d323bf64c974f5fca03778174615dbc30c8d36db645bf5
                    x-checker-data:
                      type: anitya
                      project-id: 205796
                      stable-only: true
                      url-template: https://github.com/KhronosGroup/glslang/archive/refs/tags/$version.tar.gz
  - name: ffmpeg
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/ffmpeg/examples
    config-opts:
      - --enable-shared
      - --disable-static
      - --enable-gnutls
      - --disable-doc
      - --disable-ffplay
      - --enable-version3
      - --enable-demuxer=dash
      - --enable-libxml2
      - --disable-programs
      - --disable-encoders
      - --disable-muxers
    sources:
      - type: git
        url: https://github.com/FFmpeg/FFmpeg
        tag: n8.0.1
        commit: 894da5ca7d742e4429ffb2af534fcda0103ef593
  - name: mpv
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app mpv-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/f4/cf/0d5f52753366ecf2c3d763e331dcda54b0f20a1a8e52b175feb9c625399d/mpv-1.0.8-py3-none-any.whl
        sha256: dcf77f612e3f5ce49bd89393f37d286de7ac290db6b0800f1fdcfe0aeb5ba9b8
        x-checker-data:
          type: pypi
          packagetype: bdist_wheel
          name: mpv
    modules:
      - name: PyOpenGL
        buildsystem: simple
        build-commands:
          - pip3 install --prefix=/app pyopengl-*.whl
        sources:
          - type: file
            url: https://files.pythonhosted.org/packages/de/e4/1ba6f44e491c4eece978685230dde56b14d51a0365bc1b774ddaa94d14cd/pyopengl-3.1.10-py3-none-any.whl
            sha256: 794a943daced39300879e4e47bd94525280685f42dbb5a998d336cfff151d74f
            x-checker-data:
              type: pypi
              packagetype: bdist_wheel
              name: PyOpenGL
  - name: PlexAPI
    buildsystem: simple
    build-commands:
      - pip3 install --prefix=/app plexapi-*.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/17/a8/9f1c54ce351d681aa0eb2221f7deccbdd5a95421507eb59e6f7ec83931d7/plexapi-4.18.1-py3-none-any.whl
        sha256: d8330cee337bc55dc006c392a58b3259239d787a32cbe4064b50a9b07a6e0b35
        x-checker-data:
          type: pypi
          packagetype: bdist_wheel
          name: PlexAPI
    modules:
      - name: idna
        buildsystem: simple
        build-commands:
          - pip3 install --prefix=/app idna-*.whl
        sources:
          - type: file
            url: https://files.pythonhosted.org/packages/1e/5e/d4e9f1a599fb8e573b7b87160658329fbf28d19eac2718f51fc3def3aa5a/idna-3.18-py3-none-any.whl
            sha256: 7f952cbe720b688055e3f87de14f5c3e5fdaa8bc3928985c4077ca689de849a2
            x-checker-data:
              type: pypi
              packagetype: bdist_wheel
              name: idna
      - name: certifi
